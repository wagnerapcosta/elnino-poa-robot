name: Radar El Nino POA - Daily Tactical

on:
  schedule:
    # 09:30 UTC = 06:30 Brasilia
    - cron: "30 9 * * *"
  workflow_dispatch:

jobs:
  run-daily-radar:
    runs-on: ubuntu-latest

    env:
      RUN_MODE: daily
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar radar diario
        run: python robot.py

      - name: Salvar relatorios e graficos
        uses: actions/upload-artifact@v4
        with:
          name: radar-diario-poa
          path: |
            reports/
            data/
